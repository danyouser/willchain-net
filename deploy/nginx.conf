# WillChain — Nginx reverse proxy for Bot API
#
# Usage:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/willchain-api
#   sudo ln -s /etc/nginx/sites-available/willchain-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: Use Cloudflare Origin Certificate or Let's Encrypt (certbot)
#
# Frontend is hosted on Cloudflare Pages — no nginx config needed for it.
# This config only handles the Bot API on api.willchain.net.

# Rate limiting zone: 10 req/s per IP with burst
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name api.willchain.net;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.willchain.net;

    # --- SSL ---
    # Option A: Cloudflare Origin Certificate
    ssl_certificate     /etc/ssl/cloudflare/willchain-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/willchain-origin-key.pem;

    # Option B: Let's Encrypt (uncomment and remove Option A)
    # ssl_certificate     /etc/letsencrypt/live/api.willchain.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.willchain.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # --- Security headers ---
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # --- Proxy to Bot API ---
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # --- Health check (no rate limit) ---
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        access_log off;
    }

    # Block everything else
    location ~ /\. {
        deny all;
    }
}
