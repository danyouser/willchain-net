<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b7dd8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Chain: left link -->
  <rect x="19" y="12" width="11" height="6" rx="3" ry="3"
    fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2"/>
  <!-- Chain: right link -->
  <rect x="34" y="12" width="11" height="6" rx="3" ry="3"
    fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2"/>
  <!-- Connecting line between links -->
  <line x1="30" y1="15" x2="34" y2="15" stroke="rgba(255,255,255,0.75)" stroke-width="2"/>

  <!-- W — bold stroke letter, centered -->
  <polyline
    points="12,22 20,50 32,32 44,50 52,22"
    fill="none"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
